<script>
// 반드시 Apps Script "웹 앱 배포" 후 받은 /exec URL로 교체
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwCEc8IXuxBReJ1we1FOuwjt_zZx0KdY3FOdlsMRJ2MdVjHwsv_JPpbhEPSypJQ4O_8/exec";

const POSITIONS = [
  { name: "Creative",                      visible: true },
  { name: "Designer",                      visible: true },
  { name: "Marketing",                     visible: true },
  { name: "Logistics 담당자",              visible: true },
  { name: "SCM 담당자",                    visible: true },
  { name: "Sourcing 담당자",               visible: true },
  { name: "합정 스토어 매니저 / 스태프",   visible: true },
  { name: "더현대 스토어 매니저 / 스태프", visible: true },
];

const select = document.getElementById("positionSelect");

POSITIONS.filter(p => p.visible).forEach(p => {
  const opt = document.createElement("option");
  opt.value = p.name;
  opt.textContent = p.name;
  select.appendChild(opt);
});

select.addEventListener("change", () => {
  select.classList.remove("placeholder");
  document.getElementById("posErr").style.display = "none";
});

function setupUpload(inputId, boxId, nameId) {
  const input = document.getElementById(inputId);
  const box = document.getElementById(boxId);
  const name = document.getElementById(nameId);

  const setFile = (file) => {
    name.textContent = "✓ " + file.name;
    box.classList.add("has-file");
  };

  input.addEventListener("change", () => {
    if (input.files[0]) setFile(input.files[0]);
  });

  box.addEventListener("click", () => input.click());

  box.addEventListener("dragover", (e) => {
    e.preventDefault();
    box.classList.add("dragover");
  });

  box.addEventListener("dragleave", () => {
    box.classList.remove("dragover");
  });

  box.addEventListener("drop", (e) => {
    e.preventDefault();
    box.classList.remove("dragover");
    if (e.dataTransfer.files && e.dataTransfer.files[0]) {
      input.files = e.dataTransfer.files;
      setFile(e.dataTransfer.files[0]);
    }
  });
}

setupUpload("resumeFile", "resumeBox", "resumeName");
setupUpload("coverFile", "coverBox", "coverName");
setupUpload("portfolioFile", "portfolioBox", "portfolioName");

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    if (!file) {
      resolve(null);
      return;
    }

    const reader = new FileReader();

    reader.onload = () => {
      try {
        const result = reader.result;
        const base64 = String(result).split(",")[1];
        resolve(base64);
      } catch (err) {
        reject(err);
      }
    };

    reader.onerror = () => reject(new Error("파일 읽기에 실패했습니다."));
    reader.readAsDataURL(file);
  });
}

function showPage(id) {
  document.querySelectorAll(".page").forEach((p) => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}

document.getElementById("appForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  let valid = true;

  const position = select.value;
  const lastNameEl = document.getElementById("lastName");
  const firstNameEl = document.getElementById("firstName");
  const coverFile = document.getElementById("coverFile").files[0];

  const posErr = document.getElementById("posErr");
  const coverErr = document.getElementById("coverErr");

  posErr.style.display = "none";
  coverErr.style.display = "none";

  if (!position) {
    posErr.style.display = "block";
    valid = false;
  }

  if (!lastNameEl.value.trim() || !firstNameEl.value.trim()) {
    valid = false;
  }

  if (!coverFile) {
    coverErr.style.display = "block";
    valid = false;
  }

  if (!valid) return;

  const btn = document.getElementById("submitBtn");
  const loadingEl = document.getElementById("statusLoading");
  const errorEl = document.getElementById("statusError");

  btn.disabled = true;
  loadingEl.style.display = "block";
  errorEl.style.display = "none";
  errorEl.textContent = "";

  try {
    const resumeFile = document.getElementById("resumeFile").files[0];
    const portfolioFile = document.getElementById("portfolioFile").files[0];

    const [resumeBase64, coverBase64, portfolioBase64] = await Promise.all([
      fileToBase64(resumeFile),
      fileToBase64(coverFile),
      fileToBase64(portfolioFile),
    ]);

    const payload = {
      position,
      lastName: lastNameEl.value.trim(),
      firstName: firstNameEl.value.trim(),
      email: document.getElementById("email").value.trim(),
      phone: document.getElementById("phone").value.trim(),
      sns: document.getElementById("sns").value.trim(),
      other: document.getElementById("other").value.trim(),
      submittedAt: new Date().toLocaleString("ko-KR", { timeZone: "Asia/Seoul" }),
      resume: resumeFile
        ? { name: resumeFile.name, data: resumeBase64 }
        : null,
      cover: coverFile
        ? { name: coverFile.name, data: coverBase64 }
        : null,
      portfolio: portfolioFile
        ? { name: portfolioFile.name, data: portfolioBase64 }
        : null,
    };

    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(payload),
    });

    const rawText = await res.text();

    let result;
    try {
      result = JSON.parse(rawText);
    } catch {
      throw new Error(`JSON 응답 파싱 실패: ${rawText.slice(0, 200)}`);
    }

    if (!res.ok) {
      throw new Error(result.message || `HTTP ${res.status}`);
    }

    if (result.status !== "ok") {
      throw new Error(result.message || "서버 오류");
    }

    loadingEl.style.display = "none";
    showPage("page2");
  } catch (err) {
    console.error("Submit failed:", err);
    loadingEl.style.display = "none";
    errorEl.textContent = "제출 실패: " + (err.message || "알 수 없는 오류");
    errorEl.style.display = "block";
    btn.disabled = false;
  }
});
</script>
